# Execute unit tests on any push or pull request merge to main branch
# Excludes several files that do not affect the code

name: Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tofu/**'
      - 'docs/**'
      - 'tests/**'
      - '**/*.md'
      - '**/.*'

  pull_request:
    branches: [main]
    paths-ignore:
      - 'tofu/**'
      - 'docs/**'
      - 'tests/**'
      - '**/*.md'
      - '**/.*'

# Cancel existing executions when new commits are pushed onto the branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Unit tests
        run: npm run test:unit

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
