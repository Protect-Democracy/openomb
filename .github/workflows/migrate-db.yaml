name: Migrate database

on:
  push:
    branches: ['main']
    paths:
      - 'db/**'

  workflow_dispatch:

env:
  AWS_REGION: 'us-west-2'
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  tf_actions_working_dir: 'tofu'

jobs:
  deploy:
    name: Migrate database
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.tf_actions_working_dir }}

    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read

    steps:
      -  uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-db-migration
          aws-region: ${{ env.AWS_REGION }}
          unset-current-credentials: true

      - name: OpenTofu init
        id: init
        run: tofu init

      - name: Set task definition ARN
        id: aws_task_def_arn
        run: |
          tofu output --raw migrate_task_definition_arn

      - name: Set cluster ARN
        id: aws_ecs_cluster_arn
        run: |
          tofu output --raw ecs_cluster_arn

      - name: Set network config
        id: aws_run_task_network_config
        run: |
          tofu output --raw run_task_network_configuration_string

      - name: Run ECS database migration task
        shell: bash
        run: |
          aws ecs run-task --task-definition "${{ steps.aws_task_def_arn.outputs.stdout }}" --cluster "${{ steps.aws_ecs_cluster_arn.output.stdout }}" --network-configuration "${{ steps.aws_run_task_network_config }}" --launch-type FARGATE
