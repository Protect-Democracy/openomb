version: '3.9'
services:
  web:
    build:
      context: .
    environment:
      - APPORTIONMENTS_DB_URI=postgres://postgres@host.docker.internal:5432/apportionments
      - NOTIFICATIONS_SERVICE_URI=http://notifications:8080
      - AUTH_SECRET=97ea9721afd3c427f6806c8d70b6207e
      - ORIGIN=http://localhost:3000
      - APPORTIONMENTS_SENTRY_SVELTE_REPORT_URI=
      - PUBLIC_SENTRY_SVELTE_DSN=
      - PUBLIC_NODE_ENV=development
    ports:
      - '3000:5173'
    volumes:
      - ./:/app
      - ./node_modules:/app/node_modules
    working_dir: /app
    command: npm run dev -- --host

include:
  - ./notifications/docker-compose.dev.yaml
